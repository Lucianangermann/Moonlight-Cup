name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Expo Web
        run: npx expo export --platform web --clear
        env:
          CI: false

      - name: Fix asset paths for GitHub Pages
        run: |
          python3 - << 'PYEOF'
          import os, glob

          BASE = "/Moonlight-Cup"

          # Fix index.html
          with open("dist/index.html", "r", encoding="utf-8") as f:
              html = f.read()
          html = html.replace('href="/', f'href="{BASE}/')
          html = html.replace('src="/', f'src="{BASE}/')
          with open("dist/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("Patched index.html")

          # Fix all JS bundles
          total = 0
          for path in glob.glob("dist/**/*.js", recursive=True):
              with open(path, "r", encoding="utf-8") as f:
                  content = f.read()
              new = content \
                  .replace('"/_expo/', f'"{BASE}/_expo/') \
                  .replace("'/_expo/", f"'{BASE}/_expo/") \
                  .replace('"/assets/', f'"{BASE}/assets/') \
                  .replace("'/assets/", f"'{BASE}/assets/")
              if new != content:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new)
                  total += 1
          print(f"Patched {total} JS files")
          PYEOF

          # Prevent Jekyll from ignoring _expo folder
          touch dist/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
