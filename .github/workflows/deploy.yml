name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Expo Web
        run: npx expo export --platform web --clear
        env:
          CI: false

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|href="/|href="/Moonlight-Cup/|g' dist/index.html
          sed -i 's|src="/|src="/Moonlight-Cup/|g' dist/index.html
          find dist -name "*.js" -exec sed -i 's|"/_expo/|"/Moonlight-Cup/_expo/|g' {} \;
          find dist -name "*.js" -exec sed -i "s|'/_expo/|'/Moonlight-Cup/_expo/|g" {} \;
          find dist -name "*.js" -exec sed -i 's|"/assets/|"/Moonlight-Cup/assets/|g' {} \;
          find dist -name "*.js" -exec sed -i "s|'/assets/|'/Moonlight-Cup/assets/|g" {} \;

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
